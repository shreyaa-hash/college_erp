{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 250px);">
    <div class="col-md-5">
        <div class="card-premium p-4 animate-fade-in">
            <div class="text-center mb-4">
                <div class="card-icon card-icon-secondary mx-auto">
                    <i class="fa-solid fa-user-tie"></i>
                </div>
                <h2 class="fw-bold text-dark mt-2">Faculty Portal</h2>
                <p class="text-muted small">Enter your administrative credentials to update class status, grades, notices, or timetables.</p>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="faculty_id" class="form-label fw-semibold text-dark">Faculty ID</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                        <input 
                            type="text" 
                            name="faculty_id" 
                            id="faculty_id"
                            class="form-control form-control-custom border-start-0 ps-0" 
                            placeholder="Enter Faculty ID" 
                            required
                        >
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold text-dark">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input 
                            type="password" 
                            name="password" 
                            id="password"
                            class="form-control form-control-custom border-start-0 ps-0" 
                            placeholder="Enter Password" 
                            required
                        >
                    </div>
                </div>

                <button class="btn btn-premium btn-premium-secondary w-100 py-2.5">
                    <i class="fa-solid fa-lock-open me-2"></i>Authenticate Admin
                </button>
            </form>

            {% if message %}
                <div class="alert alert-danger mt-3 mb-0 py-2.5 text-center small border-0 shadow-sm" role="alert">
                    <i class="fa-solid fa-triangle-exclamation me-1"></i> {{ message }}
                </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
